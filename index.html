function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function FlashcardView({ topic, onBack }) {
  const cards = FLASHCARDS[topic];
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [order, setOrder] = React.useState(() => shuffle(cards.map((_,i) => i)));
  const [score, setScore] = React.useState({ knew:0, missed:0 });

  const reset = () => { setOrder(shuffle(cards.map((_,i) => i))); setIdx(0); setFlipped(false); setScore({knew:0,missed:0}); };
  const card = cards[order[idx]];
  const done = idx >= order.length;
  const pct = done ? Math.round((score.knew/order.length)*100) : 0;

  if (done) return (
    <div className="pop-in" style={{textAlign:"center",padding:48}}>
      <div style={{fontSize:48,marginBottom:12}}>{pct >= 80 ? "🎉" : "💪"}</div>
      <div style={{fontSize:28,fontWeight:800,fontFamily:"'Space Grotesk',sans-serif",color:pct>=80?"#34d399":"#f87171"}}>{pct}%</div>
      <div style={{fontSize:15,color:"#888",margin:"8px 0 24px"}}>✅ {score.knew} knew &nbsp;·&nbsp; ❌ {score.missed} missed</div>
      <button onClick={reset} style={{background:"#FFB648",color:"#000",border:"none",borderRadius:10,padding:"12px 28px",fontWeight:700,fontSize:15}}>Go Again</button>
    </div>
  );

  return (
    <div className="fade-up" style={{padding:20}}>
      <div className="progress-bar" style={{marginBottom:20}}><div className="progress-fill" style={{width:`${((idx)/order.length)*100}%`}}/></div>
      <div style={{fontSize:13,color:"#666",marginBottom:16,textAlign:"center"}}>Card {idx+1} of {order.length}</div>
      <div className="card-container" onClick={()=>setFlipped(!flipped)} style={{height:220,marginBottom:24}}>
        <div className={`card-inner ${flipped?"flipped":""}`} style={{width:"100%",height:"100%"}}>
          <div className="card-front" style={{background:"linear-gradient(135deg,#1a1a1a,#252525)",border:"1px solid #333"}}>
            <span style={{fontSize:22,fontWeight:700,fontFamily:"'Space Grotesk',sans-serif",color:"#FFB648"}}>{card.front}</span>
          </div>
          <div className="card-back" style={{background:"linear-gradient(135deg,#0a2e1a,#1a1a1a)",border:"1px solid #34d399"}}>
            <span style={{fontSize:16,fontWeight:500,whiteSpace:"pre-wrap",lineHeight:1.6,textAlign:"center",color:"#d1fae5"}}>{card.back}</span>
          </div>
        </div>
      </div>
      {!flipped && <div style={{textAlign:"center",fontSize:12,color:"#555"}}>Tap to flip</div>}
      {flipped && (
        <div className="pop-in" style={{display:"flex",gap:12,justifyContent:"center"}}>
          <button onClick={()=>{setScore(s=>({...s,knew:s.knew+1}));setFlipped(false);setIdx(i=>i+1)}} style={{background:"#0a2e1a",color:"#34d399",border:"1px solid #34d399",borderRadius:10,padding:"10px 24px",fontWeight:700,fontSize:14}}>✅ Knew it</button>
          <button onClick={()=>{setScore(s=>({...s,missed:s.missed+1}));setFlipped(false);setIdx(i=>i+1)}} style={{background:"#2e0a0a",color:"#f87171",border:"1px solid #f87171",borderRadius:10,padding:"10px 24px",fontWeight:700,fontSize:14}}>❌ Missed</button>
        </div>
      )}
    </div>
  );
}

function QuizView({ questions, onBack, title }) {
  const [order, setOrder] = React.useState(() => shuffle(questions.map((_,i) => i)));
  const [idx, setIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [showResult, setShowResult] = React.useState(false);
  const shuffledOpts = React.useRef({});

  const reset = () => { setOrder(shuffle(questions.map((_,i) => i))); setIdx(0); setSelected(null); setScore(0); setShowResult(false); shuffledOpts.current={}; };
  const done = idx >= order.length;

  if (done) {
    const pct = Math.round((score/order.length)*100);
    return (
      <div className="pop-in" style={{textAlign:"center",padding:48}}>
        <div style={{fontSize:48,marginBottom:12}}>{pct>=90?"🏆":pct>=80?"🎉":pct>=60?"📚":"💪"}</div>
        <div style={{fontSize:36,fontWeight:800,fontFamily:"'Space Grotesk',sans-serif",color:pct>=80?"#34d399":pct>=60?"#FFB648":"#f87171"}}>{pct}%</div>
        <div style={{fontSize:16,color:"#888",margin:"8px 0 4px"}}>{score}/{order.length} correct</div>
        <div style={{fontSize:13,color:"#555",marginBottom:28}}>{pct>=90?"Incredible!":pct>=80?"Great job!":pct>=60?"Getting there!":"Keep studying!"}</div>
        <button onClick={reset} style={{background:"#FFB648",color:"#000",border:"none",borderRadius:10,padding:"12px 28px",fontWeight:700,fontSize:15}}>Try Again</button>
      </div>
    );
  }

  const q = questions[order[idx]];
  if (!shuffledOpts.current[idx]) shuffledOpts.current[idx] = shuffle(q.opts);
  const opts = shuffledOpts.current[idx];

  const handleSelect = (opt) => {
    if (selected !== null) return;
    setSelected(opt);
    setShowResult(true);
    if (opt === q.a) setScore(s => s + 1);
    setTimeout(() => { setSelected(null); setShowResult(false); setIdx(i => i + 1); }, 1400);
  };

  return (
    <div className="fade-up" style={{padding:20}}>
      <div className="progress-bar" style={{marginBottom:16}}><div className="progress-fill" style={{width:`${(idx/order.length)*100}%`}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#666",marginBottom:16}}>
        <span>Q{idx+1} of {order.length}</span><span>Score: {score}</span>
      </div>
      <div className="slide-in" key={idx} style={{background:"#1a1a1a",borderRadius:16,padding:20,border:"1px solid #2a2a2a",marginBottom:20,fontSize:17,fontWeight:600,lineHeight:1.5}}>
        {q.q}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {opts.map((opt,i) => (
          <button key={opt} className={`quiz-opt ${showResult && opt===q.a?"correct":""} ${showResult && opt===selected && opt!==q.a?"wrong":""}`}
            onClick={()=>handleSelect(opt)} disabled={selected!==null}
            style={{animationDelay:`${i*0.05}s`}}>{opt}</button>
        ))}
      </div>
    </div>
  );
}

          <b style={{color:"#ccc"}}>Gerundio:</b> -AR→-ando · -ER/-IR→-iendo · vowel→-yendo<br/>
          <b style={{color:"#ccc"}}>DOPs:</b> lo, la, los, las · <b style={{color:"#ccc"}}>IOPs:</b> me, te, le, nos, les<br/>
          <b style={{color:"#ccc"}}>Doler:</b> like gustar → duele (1) / duelen (2+)<br/>
          <b style={{color:"#ccc"}}>Jugar:</b> jugar + a + el = al
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
